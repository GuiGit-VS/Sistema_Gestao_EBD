            <td style="text-align:center">${r.f.perguntas||0}</td>
            <td>${r.f.super?"⚡":"—"}</td>
            <td>${r.f.harpa?"🎵":"—"}</td>
            <td>${r.f.professor?"📖":"—"}</td>
            <td>${r.f.musico?"🎸":"—"}</td>
          </tr>`).join("")}
        </tbody>
      </table>
      ${rows.length>300?`<p style="padding:12px;text-align:center;font-size:12px;color:var(--gray)">Exibindo 300 de ${rows.length}. Exporte para ver todos.</p>`:""}
    </div></div>`;

  } else if(relTab==="ofertas"){
    const rows=chs.map(ch=>({data:ch.data_aula,cl:cls(ch.classe_id),oferta:+ch.oferta||0}))
      .sort((a,b)=>(b.data||"").localeCompare(a.data||""));
    const total=rows.reduce((s,r)=>s+r.oferta,0);
    el.innerHTML=`<div class="card2 card2-tight"><div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr><th>Data</th><th>Classe</th><th>Oferta</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td>${toBR(r.data)}</td>
            <td><span style="color:${r.cl.cor};font-weight:700">${r.cl.emoji} ${r.cl.nome}</span></td>
            <td style="font-weight:900;color:var(--green);font-size:16px">${brl(r.oferta)}</td>
          </tr>`).join("")}
          <tr style="background:#ECFDF5;border-top:2px solid var(--green)">
            <td colspan="2" style="font-weight:900;color:var(--navy);font-size:15px">Total</td>
            <td style="font-weight:900;color:var(--green);font-size:18px">${brl(total)}</td>
          </tr>
        </tbody>
      </table>
    </div></div>`;

  } else if(relTab==="alunos") {
    // Por aluno
    const fqs=frequencias.filter(f=>chs.some(c=>c.id===f.chamada_id));
    const aRows=alunos.filter(a=>fqs.some(f=>f.aluno_id===a.id)).map(a=>{
      const af=fqs.filter(f=>f.aluno_id===a.id);
      return{
        nome:a.nome, cl:cls(a.classe_id),
        pres:af.filter(f=>f.presente===1).length,
        falta:af.filter(f=>f.presente===0).length,
        harpa:af.filter(f=>f.harpa===1).length,
        professor:af.filter(f=>f.professor===1).length,
        musico:af.filter(f=>f.musico===1).length,
        superQ:af.filter(f=>f.super===1).length,
        pts:af.reduce((s,f)=>s+(+f.pontuacao||0),0),
        total:af.length,
      };
    }).sort((a,b)=>b.pres-a.pres);
    el.innerHTML=`<div class="card2 card2-tight"><div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr><th>#</th><th>Aluno</th><th>Classe</th><th>Aulas</th><th>Pres.</th><th>Falta</th><th>Harpa</th><th>Prof.</th><th>Músico</th><th>Super</th><th>Pontos</th><th>%</th></tr></thead>
        <tbody>
          ${aRows.map((r,i)=>{const pct=r.total>0?(r.pres/r.total*100).toFixed(0):0;const cc=pct>=80?"var(--green)":pct>=50?"var(--amber)":"var(--red)";return`<tr>
            <td style="color:var(--gray)">${i+1}</td>
            <td style="font-weight:800;color:var(--navy)">${r.nome}</td>
            <td><span style="color:${r.cl.cor};font-weight:700">${r.cl.emoji} ${r.cl.nome}</span></td>
            <td>${r.total}</td>
            <td style="font-weight:700;color:var(--green)">${r.pres}</td>
            <td style="color:var(--red)">${r.falta}</td>
            <td>${r.harpa?`🎵 ${r.harpa}`:"—"}</td>
            <td>${r.professor?`📖 ${r.professor}`:"—"}</td>
            <td>${r.musico?`🎸 ${r.musico}`:"—"}</td>
            <td>${r.superQ?`⚡ ${r.superQ}`:"—"}</td>
            <td style="font-weight:800;color:var(--purple)">${r.pts}</td>
            <td style="font-weight:800;color:${cc}">${pct}%</td>
          </tr>`}).join("")}
        </tbody>
      </table>
    </div></div>`;

  } else {
    // ── 🏆 RANKING TRIMESTRAL ──────────────────────────────────
    const fqs = frequencias.filter(f=>chs.some(c=>c.id===f.chamada_id));
    if(!fqs.length){
      el.innerHTML=`<div class="empty"><div class="empty-icon">🏆</div><div class="empty-title">Sem dados no período</div><div class="empty-sub">Ajuste os filtros para ver o ranking</div></div>`;
      return;
    }
    // Build per-student stats for the filtered period
    const aStats = alunos.map(a=>{
      const af = fqs.filter(f=>f.aluno_id===a.id);
      if(!af.length) return null;
      const total = af.length;
      const pres  = af.filter(f=>f.presente===1).length;
      const pts   = af.reduce((s,f)=>s+(+f.pontuacao||0),0);
      return{id:a.id, nome:a.nome, cl:cls(a.classe_id), pres, pts, total,
             pct:total>0?(pres/total*100).toFixed(0):0};
    }).filter(Boolean);

    const byPres = [...aStats].sort((a,b)=>b.pres-a.pres||b.pct-a.pct).slice(0,3);
    const byPts  = [...aStats].sort((a,b)=>b.pts-a.pts||b.pres-a.pres).slice(0,3);
    const medals = ["🥇","🥈","🥉"];
    const medalBg = ["#FFFBEB","#F8FAFC","#FFF7ED"];
    const medalBorder = ["#F59E0B","#9CA3AF","#F97316"];

    const podiumCard = (title,subtitle,items,valueKey,valueSuffix) => `
      <div class="col-12 col-md-6">
        <div class="card2" style="border-top:4px solid var(--navy)">
          <div style="font-size:17px;font-weight:900;color:var(--navy);margin-bottom:4px">${title}</div>
          <div style="font-size:12px;color:var(--gray);margin-bottom:18px">${subtitle}</div>
          ${items.length===0?`<div style="text-align:center;color:var(--gray);padding:20px">Sem dados</div>`:""}
          ${items.map((r,i)=>`
            <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:${medalBg[i]};border-radius:14px;margin-bottom:8px;border:2px solid ${medalBorder[i]}">
              <div style="font-size:32px;line-height:1">${medals[i]}</div>
              <div style="flex:1">
                <div style="font-size:16px;font-weight:900;color:var(--navy)">${r.nome}</div>
                <div style="font-size:12px;color:${r.cl.cor};font-weight:700">${r.cl.emoji} ${r.cl.nome}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:26px;font-weight:900;color:${medalBorder[i]}">${r[valueKey]}</div>
                <div style="font-size:11px;color:var(--gray);font-weight:700">${valueSuffix(r)}</div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    `;

    // Period label from filters
    const fD  = document.getElementById("r-data")?.value||"";
    const fM  = document.getElementById("r-mes")?.value||"";
    const fA  = document.getElementById("r-ano")?.value||"";
    const periodoLabel = fD?toBR(fD):fM&&fA?`${MESES[+fM-1]}/${fA}`:fM?MESES[+fM-1]:fA?`Ano ${fA}`:"Todos os registros";

    el.innerHTML = `
      <div class="alert2 al-info show" style="margin-bottom:16px">
        📅 Período analisado: <strong>${periodoLabel}</strong> · ${chs.length} chamada${chs.length!==1?"s":""} · ${aStats.length} aluno${aStats.length!==1?"s":" "} com registros
      </div>
      <div class="row g-3">
        ${podiumCard("🏆 Top 3 — Frequência","Alunos com mais presenças no período",byPres,"pres",r=>`${r.pct}% de presença`)}
        ${podiumCard("⭐ Top 3 — Pontuação","Alunos com mais pontos no período",byPts,"pts",r=>`${r.pres} presença${r.pres!==1?"s":""}`)}
      </div>
      <div class="card2">
        <div style="font-size:15px;font-weight:800;color:var(--navy);margin-bottom:14px">📊 Tabela Completa — ${periodoLabel}</div>
        <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>Pos.</th><th>Aluno</th><th>Classe</th>
            <th>Presenças</th><th>%</th><th>Pontos</th><th>Aulas</th>
          </tr></thead>
          <tbody>
            ${[...aStats].sort((a,b)=>b.pres-a.pres).map((r,i)=>{
              const cc=r.pct>=80?"var(--green)":r.pct>=50?"var(--amber)":"var(--red)";
              return`<tr>
                <td style="font-weight:800;font-size:16px">${i<3?medals[i]:`${i+1}º`}</td>
                <td style="font-weight:800;color:var(--navy)">${r.nome}</td>
                <td><span style="color:${r.cl.cor};font-weight:700">${r.cl.emoji} ${r.cl.nome}</span></td>
                <td style="font-weight:800;color:var(--green);font-size:16px">${r.pres}</td>
                <td><span style="font-weight:800;color:${cc}">${r.pct}%</span></td>
                <td style="font-weight:800;color:var(--purple);font-size:16px">${r.pts}</td>
                <td style="color:var(--gray)">${r.total}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
        </div>
      </div>
    `;
  }
}

function limparFiltros(){
  ["r-data","r-mes","r-ano","r-cls"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  renderRelBody();
}

/* ── Exports ── */
function expFreq(){
  const chs=getRelChamadas();
  const rows=[];
  chs.forEach(ch=>{
    const cl=cls(ch.classe_id);
    frequencias.filter(f=>f.chamada_id===ch.id).forEach(f=>{
      const a=alunos.find(x=>x.id===f.aluno_id);
      rows.push({
        "Data":toBR(ch.data_aula),"Classe":cl.nome,"Aluno":a?.nome||"—",
        "Situação":f.status,"Presente":f.presente?"Sim":"Não",
        "Perguntas":f.perguntas||0,"Super":f.super?"Sim":"Não",
        "Harpa":f.harpa?"Sim":"Não","Professor":f.professor?"Sim":"Não",
        "Músico":f.musico?"Sim":"Não","Pontuação":f.pontuacao||0,
      });
    });
  });
  xlsxExp(rows,"Frequencia");
}
function expOfertas(){
  const rows=getRelChamadas().map(ch=>({"Data":toBR(ch.data_aula),"Classe":cls(ch.classe_id).nome,"Oferta (R$)":+ch.oferta||0}));
  xlsxExp(rows,"Ofertas");
}
function expGeral(){
  const rows=getRelChamadas().map(ch=>{
    const fc=frequencias.filter(f=>f.chamada_id===ch.id);
    const cl=cls(ch.classe_id);
    return{"Data":toBR(ch.data_aula),"Classe":cl.nome,
      "Alunos":fc.length,
      "Presentes":fc.filter(f=>f.presente===1).length,
      "Faltas":fc.filter(f=>f.presente===0).length,
      "Atrasados":fc.filter(f=>f.status==="ATRASADO").length,
      "Harpa":fc.filter(f=>f.harpa===1).length,
      "Professor":fc.filter(f=>f.professor===1).length,
      "Músico":fc.filter(f=>f.musico===1).length,
      "Pontuação Total":fc.reduce((s,f)=>s+(+f.pontuacao||0),0),
      "Oferta (R$)":+ch.oferta||0,
      "Visitantes":+ch.visitantes||0,
    };
  });
  xlsxExp(rows,"Relatorio_Geral");
}
function expRankingXlsx(){
  const rows=alunos.filter(a=>a.status==="ativo").map(a=>{
    const af = frequencias.filter(f=>f.aluno_id===a.id);
    return{
      "Aluno":         a.nome,
      "Classe":        cls(a.classe_id).nome||"—",
      "Presenças":     af.filter(f=>f.presente===1).length,
      "Atrasados":     af.filter(f=>f.status==="ATRASADO").length,
      "Faltas":        af.filter(f=>f.presente===0).length,
      "Harpa":         af.filter(f=>f.harpa===1).length,
      "Professor":     af.filter(f=>f.professor===1).length,
      "Músico":        af.filter(f=>f.musico===1).length,
      "Super":         af.filter(f=>f.super===1).length,
      "Perguntas":     af.reduce((s,f)=>s+(+f.perguntas||0),0),
      "Pontuação Total":af.reduce((s,f)=>s+(+f.pontuacao||0),0),
    };
  }).sort((a,b)=>b["Presenças"]-a["Presenças"]);
  xlsxExp(rows,"Ranking_Alunos");
}
function xlsxExp(data,name){
  if(!data.length){alert("Nenhum dado para exportar.");return;}
  const ws=XLSX.utils.json_to_sheet(data);
  // Auto width
  const cols=Object.keys(data[0]).map(k=>({wch:Math.max(k.length,data.reduce((m,r)=>Math.max(m,String(r[k]||"").length),0)+2)}));
  ws["!cols"]=cols;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Dados");
  XLSX.writeFile(wb,name+"_"+today()+".xlsx");
}

/* ════════════════════════════════════════════════════════════
   ENCERRAMENTO DE TRIMESTRE
   ════════════════════════════════════════════════════════════ */
function confirmarEncerramento(){
  const totCh  = chamadas.length;
  const totFq  = frequencias.length;
  const totOf  = chamadas.reduce((s,c)=>s+(+c.oferta||0),0);
  const totPres= frequencias.filter(f=>f.presente===1).length;
  if(!totCh){
    alert("Não há chamadas registradas para encerrar.");
    return;
  }
  // Build a modal-style confirm inside existing confirm dialog
  const box = document.getElementById("modal-confirm");
  document.getElementById("confirm-icon").textContent  = "🔚";
  document.getElementById("confirm-title").textContent = "Encerrar Trimestre?";
  document.getElementById("confirm-msg").innerHTML =
    `<strong>Serão apagados:</strong><br>
     • ${totCh} chamada${totCh!==1?"s":""}<br>
     • ${totFq} registro${totFq!==1?"s":""} de frequência<br>
     • Total de ofertas: ${brl(totOf)}<br>
     • Total de presenças: ${totPres}<br><br>
     <span style="color:var(--green);font-weight:700">✅ Os alunos cadastrados serão mantidos.</span><br><br>
     Um arquivo de backup será exportado automaticamente antes de apagar.`;
  document.getElementById("confirm-ok").textContent = "🔚 Confirmar Encerramento";
  document.getElementById("confirm-ok").onclick = encerrarTrimestre;
  box.classList.add("open");
}

function encerrarTrimestre(){
  closeConfirm();
  // 1. Auto-export backup with trimester label
  const trimNum = Math.ceil((new Date().getMonth()+1)/3);
  const ano     = new Date().getFullYear();
  const data    = {
    alunos, chamadas, frequencias,
    trimestre: `${trimNum}T${ano}`,
    exported: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = `backup_${trimNum}T${ano}_escola_dominical.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);

  // 2. Clear only chamadas and frequencias — keep alunos
  chamadas    = [];
  frequencias = [];
  saveData();
  updateHeader();
  renderPage("inicio");

  setTimeout(()=>{
    alert(`✅ Trimestre ${trimNum}T${ano} encerrado com sucesso!\nOs alunos foram mantidos.\nO backup foi exportado automaticamente.`);
  }, 300);
}

/* ════════════════════════════════════════════════════════════
   UTILS
   ════════════════════════════════════════════════════════════ */
function openModal(id){document.getElementById(id).classList.add("open");}
function closeModal(id){document.getElementById(id).classList.remove("open");}
function closeModalIf(e,id){if(e.target===e.currentTarget)closeModal(id);}
function showAlert(el,msg,type){
  el.className="alert2 al-"+(type==="err"?"err":type==="warn"?"warn":type==="ok"?"ok":"info")+" show";
  el.textContent=msg;
}
function clearAlert(el){if(el){el.className="alert2";el.textContent="";}}
function closeConfirm(){document.getElementById("modal-confirm").classList.remove("open");}
