<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Escola Dominical — Sistema de Gestão</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,Arial,sans-serif;background:#EEF2F7;color:#1B2E4B;font-size:15px;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
input,select,textarea{font-family:inherit;font-size:15px!important}
button,input,select{touch-action:manipulation}

/* ── COLORS ── */
:root{
  --navy:#1B2E4B;--navydark:#0F1F35;--navylight:#243B5E;
  --gold:#D97706;--green:#059669;--red:#DC2626;--amber:#F59E0B;
  --purple:#7C3AED;--blue:#2563EB;--pink:#DB2777;--teal:#0891B2;
  --gray:#6B7280;--border:#DDE3EC;--bg:#EEF2F7;--white:#fff;
  --cls1:#EF4444;--cls2:#3B82F6;--cls3:#10B981;--cls4:#F59E0B;
}

/* ── TOPBAR ── */
.topbar{background:linear-gradient(90deg,var(--navydark),var(--navylight));min-height:60px;padding:0 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:500;box-shadow:0 3px 12px rgba(0,0,0,.25)}
.topbar-logo{font-size:28px;line-height:1}
.topbar-title{font-size:18px;font-weight:800;color:#fff;line-height:1.1}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-date{text-align:right}
.topbar-date-lbl{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px}
.topbar-date-val{font-size:14px;font-weight:700;color:#fff}
.topbar-badge{background:var(--gold);border-radius:8px;padding:4px 11px;font-size:12px;font-weight:800;color:#fff;white-space:nowrap}

/* ── NAV ── */
.mainnav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:60px;z-index:400;scrollbar-width:none}
.mainnav::-webkit-scrollbar{display:none}
.mainnav-btn{flex:0 0 auto;padding:14px 20px;font-size:14px;font-weight:700;color:var(--gray);background:none;border:none;border-bottom:3px solid transparent;white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:6px;transition:color .2s,border-color .2s;min-height:52px}
.mainnav-btn:active{background:#F8FAFC}
.mainnav-btn.active{color:var(--navy);border-bottom-color:var(--navy)}

/* ── PAGES ── */
.page{display:none;padding:18px;max-width:1100px;margin:0 auto;padding-bottom:80px}
.page.active{display:block;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── CARDS ── */
.card2{background:#fff;border-radius:18px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px;border:1px solid var(--border)}
.card2-tight{padding:0;overflow:hidden}

/* ── KPI ── */
.kpi{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.07);border-left:6px solid var(--navy);min-height:110px;display:flex;flex-direction:column;justify-content:space-between}
.kpi-icon{font-size:22px;margin-bottom:5px;line-height:1}
.kpi-label{font-size:10px;color:var(--gray);font-weight:800;text-transform:uppercase;letter-spacing:.8px;line-height:1.3}
.kpi-value{font-size:24px;font-weight:900;margin-top:5px;line-height:1.15;word-break:break-word}

/* ── SECTION TITLE ── */
.sec-title{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;gap:9px}

/* ── BUTTONS ── */
.btn2{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;font-family:inherit;font-weight:700;cursor:pointer;transition:all .15s;padding:12px 20px;font-size:14px;min-height:46px}
.btn2:active{transform:scale(.96)}
.btn2-sm{padding:9px 14px;font-size:13px;min-height:38px;border-radius:10px}
.btn2-lg{padding:16px 28px;font-size:16px;min-height:54px}
.btn2-full{width:100%}
.btn-navy{background:var(--navy);color:#fff;box-shadow:0 3px 8px rgba(27,46,75,.25)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 3px 8px rgba(5,150,105,.25)}
.btn-red{background:var(--red);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-gray{background:var(--gray);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-out{background:transparent;border:2px solid var(--navy);color:var(--navy)}

/* ── FORMS ── */
.flabel{font-size:12px;font-weight:800;color:var(--gray);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.finput{width:100%;border:2px solid var(--border);border-radius:12px;padding:12px 15px;background:#fff;outline:none;font-size:15px;color:var(--navy);transition:border-color .2s,box-shadow .2s;font-family:inherit}
.finput:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,46,75,.1)}
.finput-lg{padding:14px 16px;font-size:18px;font-weight:800}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{padding:12px 16px;text-align:left;font-size:11px;color:var(--gray);font-weight:800;text-transform:uppercase;letter-spacing:.5px;background:#F8FAFC;border-bottom:2px solid var(--border)}
.tbl td{padding:12px 16px;border-top:1px solid var(--border);vertical-align:middle}
.tbl tr:hover td{background:#FAFBFC}

/* ── BADGES ── */
.badge2{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:800}
.badge-green{background:#DCFCE7;color:#166534}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-amber{background:#FEF3C7;color:#92400E}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-purple{background:#EDE9FE;color:#6D28D9}
.badge-gray{background:#F3F4F6;color:var(--gray)}

/* ── ALERT ── */
.alert2{border-radius:12px;padding:13px 16px;font-size:14px;display:none;margin-top:12px;font-weight:600}
.alert2.show{display:block}
.al-err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.al-warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.al-ok{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534}
.al-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}

/* ── STATUS BUTTONS (Chamada) ── */
.st-btn{padding:10px 13px;font-size:12px;font-weight:800;border-radius:10px;border:2px solid;background:transparent;cursor:pointer;transition:all .15s;min-height:44px;white-space:nowrap}
.st-btn:active{transform:scale(.95)}

/* ── STUDENT ROW (Chamada) ── */
.s-row{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:10px;border-left:6px solid var(--border);transition:border-left-color .2s}
.s-row-name{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:10px}

/* ── POINTS ── */
.pts-wrap{display:flex;align-items:center;gap:8px}
.pts-label{font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.pts-btn{width:36px;height:36px;border-radius:9px;border:2px solid var(--border);background:#F8FAFC;font-size:18px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--navy)}
.pts-btn:active{background:var(--border);transform:scale(.92)}
.pts-in{width:52px;text-align:center;padding:6px 4px;font-size:17px;font-weight:900;border-radius:9px;border:2px solid var(--border);color:var(--navy)}

/* ── CLASS CARDS (Início) ── */
.cls-card{border-radius:16px;padding:16px;border-left:5px solid}

/* ── CHART CARD ── */
.chart-card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);border:1px solid var(--border);margin-bottom:14px}
.chart-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:14px}

/* ── TAB BUTTONS ── */
.tab-wrap{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{padding:10px 20px;font-size:14px;font-weight:700;border-radius:10px;border:2px solid var(--navy);background:#fff;color:var(--navy);cursor:pointer;transition:all .15s;min-height:44px}
.tab-btn.active{background:var(--navy);color:#fff}

/* ── EMPTY STATE ── */
.empty{padding:52px 16px;text-align:center;color:#9CA3AF}
.empty-icon{font-size:52px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:700;margin-bottom:4px}
.empty-sub{font-size:14px}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;align-items:flex-end;justify-content:center;padding:0}
.modal-bg.open{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-radius:24px 24px 0 0}
.modal-title{font-size:18px;font-weight:800;color:var(--navy)}
.modal-close{width:36px;height:36px;border-radius:50%;border:none;background:#F3F4F6;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray)}
.modal-body{padding:24px}

/* ── PROGRESS BAR ── */
.pbar{background:var(--border);height:7px;border-radius:4px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:4px;transition:width .3s}

/* ── FOOTER ── */
.footer{background:#fff;border-top:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;font-size:11px;color:#9CA3AF;position:fixed;bottom:0;left:0;right:0;z-index:300}

/* ── CONFIRM DIALOG ── */
.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;padding:20px}
.confirm-bg.open{display:flex}
.confirm-box{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .topbar{min-height:54px;padding:0 14px}
  .page{padding:12px;padding-bottom:70px}
  .mainnav-btn{padding:12px 14px;font-size:13px}
  .kpi-value{font-size:20px}
}
@media(min-width:768px){
  .modal-bg{align-items:center;padding:20px}
  .modal-box{border-radius:24px;max-height:88vh}
}

/* ── PRINT ── */
@media print{.topbar,.mainnav,.footer,.no-print{display:none!important}.page{display:block!important;padding:0}}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════ TOP BAR ══ -->
<div class="topbar">
  <div class="topbar-logo">⛪</div>
  <div>
    <div class="topbar-title">Escola Dominical</div>
    <div class="topbar-sub">Sistema de Gestão</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-date">
      <div class="topbar-date-lbl">Hoje</div>
      <div class="topbar-date-val" id="hdr-date">—</div>
    </div>
    <div class="topbar-badge" id="hdr-count">— alunos</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ NAV ════════ -->
<nav class="mainnav" id="mainnav">
  <button class="mainnav-btn" onclick="goTo('inicio')">⛪ Início</button>
  <button class="mainnav-btn" onclick="goTo('classes')">🏫 Classes</button>
  <button class="mainnav-btn" onclick="goTo('alunos')">👥 Alunos</button>
  <button class="mainnav-btn" onclick="goTo('chamada')">📋 Chamada</button>
  <button class="mainnav-btn" onclick="goTo('indicadores')">📊 Indicadores</button>
  <button class="mainnav-btn" onclick="goTo('graficos')">📈 Gráficos</button>
  <button class="mainnav-btn" onclick="goTo('relatorios')">📄 Relatórios</button>
</nav>

<!-- ═══════════════════════════════════════════ PAGES ══════ -->
<div id="p-inicio"     class="page active"></div>
<div id="p-classes"    class="page"></div>
<div id="p-alunos"     class="page"></div>
<div id="p-chamada"    class="page"></div>
<div id="p-indicadores"class="page"></div>
<div id="p-graficos"   class="page"></div>
<div id="p-relatorios" class="page"></div>

<!-- ═══════════════════════════════════════════ FOOTER ═════ -->
<div class="footer">
  <span>⛪ Escola Dominical · v2.0</span>
  <span id="ftr-info"></span>
</div>

<!-- ═══════════════════════════════════════════ MODAL ALUNO ═ -->
<div class="modal-bg" id="modal-aluno" onclick="closeModalIf(event,'modal-aluno')">
  <div class="modal-box">
    <div class="modal-head">
      <h3 class="modal-title" id="modal-aluno-title">Aluno</h3>
      <button class="modal-close" onclick="closeModal('modal-aluno')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="al-id">
      <div class="mb-3">
        <label class="flabel">Nome completo *</label>
        <input class="finput" id="al-nome" placeholder="Ex: João da Silva" autocomplete="off">
      </div>
      <div class="mb-3">
        <label class="flabel">Classe *</label>
        <select class="finput" id="al-classe">
          <option value="">Selecione a classe...</option>
        </select>
      </div>
      <div class="mb-3" id="al-status-row" style="display:none">
        <label class="flabel">Status</label>
        <select class="finput" id="al-status">
          <option value="ativo">✅ Ativo</option>
          <option value="inativo">🚫 Inativo</option>
        </select>
      </div>
      <div class="d-flex gap-2 justify-content-end mt-3">
        <button class="btn2 btn-gray" onclick="closeModal('modal-aluno')">Cancelar</button>
        <button class="btn2 btn-green" onclick="salvarAluno()">💾 Salvar Aluno</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ MODAL CLASSE ═ -->
<div class="modal-bg" id="modal-classe" onclick="closeModalIf(event,'modal-classe')">
  <div class="modal-box">
    <div class="modal-head">
      <h3 class="modal-title" id="modal-classe-title">Classe</h3>
      <button class="modal-close" onclick="closeModal('modal-classe')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="cl-id">
      <div class="mb-3">
        <label class="flabel">Nome da Classe *</label>
        <input class="finput" id="cl-nome" placeholder="Ex: Jovens, Teens, Adultos..." autocomplete="off">
      </div>
      <div class="mb-3">
        <label class="flabel">Emoji</label>
        <div id="cl-emojis" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px"></div>
        <input type="hidden" id="cl-emoji" value="🏫">
      </div>
      <div class="mb-3">
        <label class="flabel">Cor</label>
        <div id="cl-cores" style="display:flex;flex-wrap:wrap;gap:8px"></div>
        <input type="hidden" id="cl-cor" value="#3B82F6">
      </div>
      <div id="cl-preview" style="margin:12px 0;padding:14px 16px;border-radius:12px;background:#F8FAFC;border:2px solid var(--border);display:flex;align-items:center;gap:10px">
        <span id="cl-prev-emoji" style="font-size:24px">🏫</span>
        <span id="cl-prev-nome" style="font-weight:800;color:var(--navy);font-size:16px">Nova Classe</span>
      </div>
      <div class="d-flex gap-2 justify-content-end mt-3">
        <button class="btn2 btn-gray" onclick="closeModal('modal-classe')">Cancelar</button>
        <button class="btn2 btn-green" onclick="salvarClasse()">💾 Salvar Classe</button>
      </div>
    </div>
  </div>
</div>
<div class="confirm-bg" id="modal-confirm">
  <div class="confirm-box">
    <div id="confirm-icon" style="font-size:40px;margin-bottom:10px">⚠️</div>
    <h4 id="confirm-title" style="font-size:17px;font-weight:800;color:var(--navy);margin-bottom:8px"></h4>
    <p id="confirm-msg" style="color:var(--gray);font-size:14px;margin-bottom:20px"></p>
    <div class="d-flex gap-2 justify-content-center">
      <button class="btn2 btn-gray" onclick="closeConfirm()">Cancelar</button>
      <button class="btn2 btn-red" id="confirm-ok">Confirmar</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   DATA LAYER
   ════════════════════════════════════════════════════════════ */
let CLASSES = [];
const clsBg = cor => cor + "18";
const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const STATUS = {
  FALTA:    {c:"#DC2626", bg:"#FEF2F2", emoji:"❌", pts:0,  label:"Ausente"},
  ATRASADO: {c:"#7C3AED", bg:"#EDE9FE", emoji:"⏰", pts:5,  label:"Presente (+5 pts)"},
  PRESENTE: {c:"#059669", bg:"#F0FDF4", emoji:"✅", pts:15, label:"Presente (+15 pts)"},
};
const BONUS = {
  harpa:     {c:"#0891B2", bg:"#ECFEFF", emoji:"🎵", label:"HARPA",   pts:5},
  professor: {c:"#D97706", bg:"#FFFBEB", emoji:"📖", label:"PROF.",   pts:5},
  musico:    {c:"#7C3AED", bg:"#EDE9FE", emoji:"🎸", label:"MÚSICO",  pts:5},
  super:     {c:"#DC2626", bg:"#FEF2F2", emoji:"⚡", label:"SUPER",   pts:15},
};
function calcPts(r){
  if(!r.status || r.status==="FALTA") return 0;
  const base      = STATUS[r.status]?.pts || 0;
  const bonus     = (r.harpa?5:0) + (r.professor?5:0) + (r.musico?5:0) + (r.super?15:0);
  const perguntas = (+r.perguntas||0) * 5;
  return base + bonus + perguntas;
}

let alunos    = [];
let chamadas  = [];
let frequencias = [];
let chartInstances = {};

/* ── helpers ── */
const uid      = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const today    = () => new Date().toISOString().slice(0,10);
const toBR     = s  => s ? s.split("-").reverse().join("/") : "—";
const brl      = v  => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(+v||0);
const cls      = id => CLASSES.find(c=>c.id==id) || {};
const storeKey = k  => "ed_" + k;

/* ── persistence ── */
function saveData(){
  try{
    localStorage.setItem(storeKey("classes"),    JSON.stringify(CLASSES));
    localStorage.setItem(storeKey("alunos"),     JSON.stringify(alunos));
    localStorage.setItem(storeKey("chamadas"),   JSON.stringify(chamadas));
    localStorage.setItem(storeKey("frequencias"),JSON.stringify(frequencias));
  }catch(e){console.warn("Storage:",e);}
}
function loadData(){
  try{
    const storedCls = JSON.parse(localStorage.getItem(storeKey("classes")) || "null");
    CLASSES     = storedCls && storedCls.length ? storedCls : [];
    alunos      = JSON.parse(localStorage.getItem(storeKey("alunos"))     || "[]");
    chamadas    = JSON.parse(localStorage.getItem(storeKey("chamadas"))   || "[]");
    frequencias = JSON.parse(localStorage.getItem(storeKey("frequencias"))|| "[]");
  }catch(e){CLASSES=[];alunos=[];chamadas=[];frequencias=[];}
}
function exportBackup(){
  const data = {CLASSES,alunos,chamadas,frequencias,exported: new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download="backup_escola_dominical_"+today()+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function importBackup(file){
  const r = new FileReader();
  r.onload = e => {
    try{
      const d = JSON.parse(e.target.result);
      if(!d.alunos)throw new Error("Arquivo inválido");
      if(d.CLASSES && d.CLASSES.length) CLASSES = d.CLASSES;
      alunos      = d.alunos      || [];
      chamadas    = d.chamadas    || [];
      frequencias = d.frequencias || [];
      saveData(); updateHeader(); renderPage(curPage);
      alert("✅ Backup restaurado com sucesso!");
    }catch{alert("❌ Arquivo de backup inválido.");}
  };
  r.readAsText(file);
}

/* ════════════════════════════════════════════════════════════
   NAVIGATION
   ════════════════════════════════════════════════════════════ */
let curPage = "inicio";
const PAGES = ["inicio","classes","alunos","chamada","indicadores","graficos","relatorios"];

function goTo(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".mainnav-btn").forEach(x=>x.classList.remove("active"));
  document.getElementById("p-"+p).classList.add("active");
  document.querySelectorAll(".mainnav-btn")[PAGES.indexOf(p)].classList.add("active");
  curPage = p;
  renderPage(p);
  window.scrollTo({top:0,behavior:"smooth"});
}
function renderPage(p){
  if(p==="inicio")          renderInicio();
  else if(p==="classes")    renderClasses();
  else if(p==="alunos")     renderAlunos();
  else if(p==="chamada")    renderChamada();
  else if(p==="indicadores")renderIndicadores();
  else if(p==="graficos")   renderGraficos();
  else if(p==="relatorios") renderRelatorios();
}

/* ════════════════════════════════════════════════════════════
   HEADER
   ════════════════════════════════════════════════════════════ */
function updateHeader(){
  const d = new Date();
  document.getElementById("hdr-date").textContent =
    ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d.getDay()] + ", " + toBR(today());
  const ativos = alunos.filter(a=>a.status==="ativo").length;
  document.getElementById("hdr-count").textContent = ativos + " aluno" + (ativos!==1?"s":"");
  document.getElementById("ftr-info").textContent =
    `${alunos.length} alunos · ${chamadas.length} chamadas · ${frequencias.length} registros`;
}

/* ════════════════════════════════════════════════════════════
   PAGE: INÍCIO (DASHBOARD)
   ════════════════════════════════════════════════════════════ */
function renderInicio(){
  const ativos = alunos.filter(a=>a.status==="ativo");
  // último domingo registrado
  const lastDate = [...new Set(chamadas.map(c=>c.data_aula))].sort().reverse()[0] || null;
  let lastStats = {presentes:0, oferta:0, topPres:"—", topOferta:"—"};
  if(lastDate){
    const lchs = chamadas.filter(c=>c.data_aula===lastDate);
    const lfqs = frequencias.filter(f=>lchs.some(c=>c.id===f.chamada_id));
    lastStats.presentes = lfqs.filter(f=>f.presente===1).length;
    lastStats.oferta    = lchs.reduce((s,c)=>s+(+c.oferta||0),0);
    const byC = CLASSES.map(cl=>{
      const ch=lchs.find(c=>c.classe_id===cl.id);
      if(!ch) return{...cl,pct:0,oferta:0};
      const fc=lfqs.filter(f=>f.chamada_id===ch.id);
      const tot=ativos.filter(a=>a.classe_id===cl.id).length;
      return{...cl, pct:tot>0?fc.filter(f=>f.presente===1).length/tot:0, oferta:+ch.oferta||0};
    });
    lastStats.topPres   = [...byC].sort((a,b)=>b.pct-a.pct)[0]?.nome||"—";
    lastStats.topOferta = [...byC].sort((a,b)=>b.oferta-a.oferta)[0]?.nome||"—";
  }
  const totalArrec = chamadas.reduce((s,c)=>s+(+c.oferta||0),0);
  const totalPres  = frequencias.filter(f=>f.presente===1).length;
  const totalPts   = frequencias.reduce((s,f)=>s+(+f.pontuacao||0),0);

  const kpis = [
    {icon:"👥", lbl:"Alunos Ativos",              val: ativos.length,             cor:"var(--navy)"},
    {icon:"✅", lbl:"Presentes (último dia)",      val: lastStats.presentes,       cor:"var(--green)"},
    {icon:"💰", lbl:"Oferta (último dia)",         val: lastDate?brl(lastStats.oferta):"—", cor:"var(--amber)"},
    {icon:"🏆", lbl:"↑ Presença (último dia)",    val: lastStats.topPres,         cor:"var(--purple)"},
    {icon:"⭐", lbl:"↑ Oferta (último dia)",      val: lastStats.topOferta,       cor:"#DB2777"},
    {icon:"💵", lbl:"Total Arrecadado",           val: brl(totalArrec),           cor:"var(--teal)"},
  ];

  const el = document.getElementById("p-inicio");
  el.innerHTML = `
    <div class="sec-title">⛪ Escola Dominical</div>
    ${!lastDate?`<div class="alert2 al-info show" style="margin-bottom:16px">🎉 Bem-vindo! Cadastre os alunos em <strong>Alunos</strong> e registre a primeira chamada.</div>`:""}
    ${lastDate?`<p style="color:var(--gray);font-size:13px;margin-top:-12px;margin-bottom:16px">Último registro: ${toBR(lastDate)}</p>`:""}
    <div class="row g-2 mb-3">
      ${kpis.map(k=>`
        <div class="col-6 col-md-4">
          <div class="kpi" style="border-left-color:${k.cor}">
            <div class="kpi-icon">${k.icon}</div>
            <div class="kpi-label">${k.lbl}</div>
            <div class="kpi-value" style="color:${k.cor};font-size:${String(k.val).length>10?'15px':'22px'}">${k.val}</div>
          </div>
        </div>`).join("")}
    </div>

    <div class="card2">
      <div style="font-size:15px;font-weight:800;color:var(--navy);margin-bottom:16px">📚 Classes</div>
      <div class="row g-2">
        ${CLASSES.map(cl=>{
          const n = ativos.filter(a=>a.classe_id===cl.id).length;
          const ch = chamadas.filter(c=>c.classe_id===cl.id).length;
          const pts = frequencias.filter(f=>chamadas.some(c=>c.id===f.chamada_id&&c.classe_id===cl.id)).reduce((s,f)=>s+(+f.pontuacao||0),0);
          return`<div class="col-6 col-md-3">
            <div class="cls-card" style="background:${cl.cor+"18"};border-left-color:${cl.cor}">
              <div style="font-size:26px;margin-bottom:5px">${cl.emoji}</div>
              <div style="font-weight:800;color:var(--navy);font-size:15px">${cl.nome}</div>
              <div style="font-size:12px;color:var(--gray);margin-top:4px">${n} aluno${n!==1?"s":""} ativo${n!==1?"s":""}</div>
              <div style="font-size:12px;color:var(--gray)">${ch} chamada${ch!==1?"s":""}</div>
              <div style="font-size:12px;color:var(--purple);font-weight:700">${pts} pontos</div>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>

    <div class="card2">
      <div style="font-size:15px;font-weight:800;color:var(--navy);margin-bottom:16px">📊 Totais Gerais</div>
      <div class="row g-2">
        ${[
          ["Total de Chamadas",chamadas.length,"var(--navy)"],
          ["Total de Presenças",totalPres,"var(--green)"],
          ["Alunos com Harpa",frequencias.filter(f=>f.harpa===1).length,"var(--teal)"],
          ["Alunos Professores",frequencias.filter(f=>f.professor===1).length,"var(--amber)"],
          ["Total Arrecadado",brl(totalArrec),"var(--amber)"],
          ["Total de Pontos",totalPts,"var(--purple)"],
        ].map(([l,v,c])=>`<div class="col-6 col-md-4"><div style="background:#F8FAFC;border-radius:12px;padding:14px 15px;border-left:4px solid ${c}">
          <div style="font-size:11px;color:var(--gray);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">${l}</div>
          <div style="font-size:20px;font-weight:900;color:${c}">${v}</div>
        </div></div>`).join("")}
      </div>
    </div>

    <div class="card2" style="border-top:4px solid #DC2626">
      <div style="display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div style="font-size:16px;font-weight:900;color:#DC2626;margin-bottom:6px">🔚 Encerramento de Trimestre</div>
          <p style="font-size:13px;color:var(--gray);margin:0;line-height:1.6">
            Apaga todas as <strong>chamadas, frequências e ofertas</strong> do trimestre encerrado.<br>
            Os <strong>alunos são mantidos</strong>. Um backup é exportado automaticamente antes de apagar.
          </p>
        </div>
        <button class="btn2 btn-red" onclick="confirmarEncerramento()" style="flex:0 0 auto;white-space:nowrap">
          🔚 Encerrar Trimestre
        </button>
      </div>
    </div>

    <div class="card2">
      <div style="font-size:15px;font-weight:800;color:var(--navy);margin-bottom:14px">⚙️ Utilitários</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn2 btn2-sm btn-teal" onclick="exportBackup()">💾 Exportar Backup</button>
        <label class="btn2 btn2-sm btn-amber" style="cursor:pointer">📂 Importar Backup
          <input type="file" accept=".json" style="display:none" onchange="importBackup(this.files[0])">
        </label>
        <button class="btn2 btn2-sm btn-gray" onclick="if(confirm('Limpar TODOS os dados incluindo alunos? Esta ação não pode ser desfeita!')){clearAll()}">🗑️ Limpar Tudo</button>
        <button class="btn2 btn2-sm btn-red" onclick="if(confirm('Remover TODAS as classes cadastradas? Os alunos e chamadas também serão apagados.')){CLASSES=[];alunos=[];chamadas=[];frequencias=[];saveData();updateHeader();renderPage(curPage);}">🗑️ Zerar Classes</button>
      </div>
      <p style="font-size:11px;color:var(--gray);margin-top:10px;margin-bottom:0">💡 Dica: Use "Exportar Backup" regularmente para não perder dados.</p>
    </div>
  `;
}

function clearAll(){
  alunos=[]; chamadas=[]; frequencias=[];
  saveData(); updateHeader(); renderPage(curPage);
}

/* ════════════════════════════════════════════════════════════
   PAGE: CLASSES
   ════════════════════════════════════════════════════════════ */
function renderClasses(){
  const el = document.getElementById("p-classes");
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px">
      <div class="sec-title" style="margin:0">🏫 Classes</div>
      <button class="btn2 btn-navy" onclick="openNovaClasse()">+ Nova Classe</button>
    </div>
    ${CLASSES.length===0?`
      <div class="card2" style="text-align:center;padding:48px 20px">
        <div style="font-size:52px;margin-bottom:12px">🏫</div>
        <div style="font-size:18px;font-weight:800;color:var(--navy);margin-bottom:8px">Nenhuma classe cadastrada</div>
        <p style="color:var(--gray);margin-bottom:20px">Crie as classes da sua Escola Dominical para começar.</p>
        <button class="btn2 btn-navy" onclick="openNovaClasse()">+ Criar Primeira Classe</button>
      </div>
    `:`
    <div class="row g-3">
      ${CLASSES.map(cl=>{
        const nAlunos   = alunos.filter(a=>a.classe_id==cl.id).length;
        const nAtivos   = alunos.filter(a=>a.classe_id==cl.id&&a.status==="ativo").length;
        const nChamadas = chamadas.filter(c=>c.classe_id==cl.id).length;
        return`<div class="col-12 col-md-6">
          <div class="card2" style="border-left:6px solid ${cl.cor};padding:18px">
            <div style="display:flex;align-items:flex-start;gap:12px">
              <div style="font-size:36px;line-height:1;flex:0 0 auto">${cl.emoji}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:18px;font-weight:900;color:${cl.cor};margin-bottom:4px;word-break:break-word">${cl.nome}</div>
                <div style="font-size:12px;color:var(--gray);margin-bottom:10px">
                  ${nAtivos} ativo${nAtivos!==1?"s":""} · ${nAlunos} total · ${nChamadas} chamada${nChamadas!==1?"s":""}
                </div>
                <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
                  <button class="btn2 btn2-sm btn-blue" onclick="openEditClasse('${cl.id}')">✏️ Renomear</button>
                  <button class="btn2 btn2-sm btn-red" onclick="excluirClasse('${cl.id}')">🗑️ Excluir</button>
                  ${nAtivos>0||nChamadas>0?`<span style="font-size:11px;color:var(--amber)">⚠️ apaga ${nAlunos} aluno(s) e ${nChamadas} chamada(s)</span>`:""}
                </div>
              </div>
              <div style="width:20px;height:20px;border-radius:50%;background:${cl.cor};flex:0 0 auto;margin-top:4px"></div>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`}
  `;
}

const CL_EMOJIS = ["🐑","👑","⚓","✨","🌟","🦋","🌸","🕊️","🌿","🔥","⚡","🎯","🏆","🌈","💎","📖","🎶","🙏","👶","🧒","🧑","🌺","🎸","🎵","🏅","🌙","☀️","⭐"];
const CL_CORES  = ["#EF4444","#3B82F6","#10B981","#F59E0B","#8B5CF6","#EC4899","#06B6D4","#F97316","#84CC16","#6366F1","#0891B2","#DC2626"];

function buildModalClasse(selEmoji, selCor){
  // Emoji grid
  const eg = document.getElementById("cl-emojis");
  if(eg){
    eg.innerHTML = CL_EMOJIS.map(e=>`
      <button type="button" id="em-${e.codePointAt(0)}" onclick="selectEmoji('${e}')"
        style="font-size:24px;width:46px;height:46px;border-radius:10px;cursor:pointer;transition:all .12s;
               border:2px solid ${e===selEmoji?selCor:"var(--border)"};
               background:${e===selEmoji?selCor+"22":"#F8FAFC"}">${e}</button>
    `).join("");
  }
  // Color grid
  const cg = document.getElementById("cl-cores");
  if(cg){
    cg.innerHTML = CL_CORES.map(c=>`
      <button type="button" id="cor-${c.slice(1)}" onclick="selectCor('${c}')"
        style="width:38px;height:38px;border-radius:9px;background:${c};cursor:pointer;transition:all .12s;
               border:3px solid ${c===selCor?"#000":"transparent"}"></button>
    `).join("");
  }
}

function openNovaClasse(){
  const defEmoji = "🌟", defCor = "#3B82F6";
  document.getElementById("modal-classe-title").textContent = "➕ Nova Classe";
  document.getElementById("cl-id").value    = "";
  document.getElementById("cl-nome").value  = "";
  document.getElementById("cl-emoji").value = defEmoji;
  document.getElementById("cl-cor").value   = defCor;
  document.getElementById("cl-prev-emoji").textContent = defEmoji;
  document.getElementById("cl-prev-nome").textContent  = "Nova Classe";
  document.getElementById("cl-preview").style.borderColor = defCor;
  buildModalClasse(defEmoji, defCor);
  openModal("modal-classe");
  setTimeout(()=>document.getElementById("cl-nome").focus(),200);
}

function openEditClasse(id){
  const cl = cls(id); if(!cl.nome) return;
  document.getElementById("modal-classe-title").textContent = "✏️ Editar Classe";
  document.getElementById("cl-id").value    = cl.id;
  document.getElementById("cl-nome").value  = cl.nome;
  document.getElementById("cl-emoji").value = cl.emoji||"🌟";
  document.getElementById("cl-cor").value   = cl.cor||"#3B82F6";
  document.getElementById("cl-prev-emoji").textContent    = cl.emoji||"🌟";
  document.getElementById("cl-prev-nome").textContent     = cl.nome;
  document.getElementById("cl-preview").style.borderColor = cl.cor||"#3B82F6";
  buildModalClasse(cl.emoji||"🌟", cl.cor||"#3B82F6");
  openModal("modal-classe");
}

function salvarClasse(){
  const id    = document.getElementById("cl-id").value;
  const nome  = document.getElementById("cl-nome").value.trim();
  const emoji = document.getElementById("cl-emoji").value || "🏫";
  const cor   = document.getElementById("cl-cor").value   || "#3B82F6";
  if(!nome){ alert("Informe o nome da classe."); return; }
  if(id){
    CLASSES = CLASSES.map(c=>c.id==id ? {...c, nome, emoji, cor} : c);
  } else {
    CLASSES.push({id: uid(), nome, emoji, cor});
  }
  saveData(); closeModal("modal-classe"); renderClasses();
}

function excluirClasse(id){
  const cl       = cls(id);
  const nAlunos  = alunos.filter(a=>a.classe_id==id).length;
  const nChamadas= chamadas.filter(c=>c.classe_id==id).length;
  const chIds    = chamadas.filter(c=>c.classe_id==id).map(c=>c.id);
  const nFreqs   = frequencias.filter(f=>chIds.includes(f.chamada_id)).length;
  const linhas   = [
    `Excluir a classe "${cl.nome}"?`,
    "",
    "Tudo abaixo será apagado permanentemente:",
    nAlunos   > 0 ? `• ${nAlunos} aluno(s)`               : null,
    nChamadas > 0 ? `• ${nChamadas} chamada(s) registrada(s)` : null,
    nFreqs    > 0 ? `• ${nFreqs} registro(s) de frequência`   : null,
    "",
    "Esta ação não pode ser desfeita.",
  ].filter(l=>l!==null).join("\n");
  if(!confirm(linhas)) return;
  frequencias = frequencias.filter(f=>!chIds.includes(f.chamada_id));
  chamadas    = chamadas.filter(c=>c.classe_id!=id);
  alunos      = alunos.filter(a=>a.classe_id!=id);
  CLASSES     = CLASSES.filter(c=>c.id!=id);
  saveData(); updateHeader(); renderClasses();
}

function selectEmoji(e){
  document.getElementById("cl-emoji").value = e;
  document.getElementById("cl-prev-emoji").textContent = e;
  const cor = document.getElementById("cl-cor").value || "#3B82F6";
  // Reset all emoji buttons
  document.querySelectorAll("#cl-emojis button").forEach(b=>{
    b.style.borderColor = "var(--border)";
    b.style.background  = "#F8FAFC";
  });
  // Highlight selected — ID uses codePointAt(0)
  const b = document.getElementById("em-"+e.codePointAt(0));
  if(b){ b.style.borderColor = cor; b.style.background = cor+"22"; }
}

function selectCor(c){
  document.getElementById("cl-cor").value = c;
  document.getElementById("cl-preview").style.borderColor = c;
  // Reset all color buttons
  document.querySelectorAll("#cl-cores button").forEach(b=>b.style.borderColor="transparent");
  const b = document.getElementById("cor-"+c.slice(1));
  if(b) b.style.borderColor = "#000";
  // Update selected emoji border to new color
  const selEm = document.getElementById("cl-emoji").value;
  if(selEm){
    const em = document.getElementById("em-"+selEm.codePointAt(0));
    if(em){ em.style.borderColor = c; em.style.background = c+"22"; }
  }
}

/* ── dynamic class select in modal-aluno ── */
function populateClasseSelect(selectedId){
  const sel = document.getElementById("al-classe");
  sel.innerHTML = '<option value="">Selecione a classe...</option>' +
    CLASSES.map(cl=>`<option value="${cl.id}" ${cl.id==selectedId?"selected":""}>${cl.emoji} ${cl.nome}</option>`).join("");
}

/* ── live preview in modal-classe ── */
document.addEventListener("input", e=>{
  if(e.target.id==="cl-nome"){
    const pr = document.getElementById("cl-prev-nome");
    if(pr) pr.textContent = e.target.value || "Nova Classe";
  }
});

/* ════════════════════════════════════════════════════════════
   PAGE: ALUNOS
   ════════════════════════════════════════════════════════════ */
let alSearch="", alCls="", alStatus="ativo";

function renderAlunos(){
  const filtered = alunos.filter(a=>
    (!alSearch || a.nome.toLowerCase().includes(alSearch.toLowerCase())) &&
    (!alCls    || a.classe_id==alCls) &&
    (!alStatus || a.status===alStatus)
  ).sort((a,b)=>a.nome.localeCompare(b.nome));

  const el = document.getElementById("p-alunos");
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px">
      <div class="sec-title" style="margin:0">👥 Alunos</div>
      <button class="btn2 btn-navy" onclick="openNovoAluno()">+ Novo Aluno</button>
    </div>

    <div class="card2">
      <div class="row g-2">
        <div class="col-12 col-md-5">
          <label class="flabel">Buscar</label>
          <input class="finput" placeholder="🔍 Nome do aluno..." value="${alSearch}"
            oninput="alSearch=this.value;renderAlunos()">
        </div>
        <div class="col-6 col-md-4">
          <label class="flabel">Classe</label>
          <select class="finput" onchange="alCls=this.value;renderAlunos()">
            <option value="" ${alCls===""?"selected":""}>Todas as classes</option>
            ${CLASSES.map(c=>`<option value="${c.id}" ${alCls==c.id?"selected":""}>${c.emoji} ${c.nome}</option>`).join("")}
          </select>
        </div>
        <div class="col-6 col-md-3">
          <label class="flabel">Status</label>
          <select class="finput" onchange="alStatus=this.value;renderAlunos()">
            <option value="" ${alStatus===""?"selected":""}>Todos</option>
            <option value="ativo" ${alStatus==="ativo"?"selected":""}>Ativos</option>
            <option value="inativo" ${alStatus==="inativo"?"selected":""}>Inativos</option>
          </select>
        </div>
      </div>
      <p style="margin-top:10px;margin-bottom:0;font-size:12px;color:var(--gray)">
        ${filtered.length} aluno${filtered.length!==1?"s":""} encontrado${filtered.length!==1?"s":""}
        · ${alunos.filter(a=>a.status==="ativo").length} ativos
        · ${alunos.filter(a=>a.status==="inativo").length} inativos
      </p>
    </div>

    <div class="card2 card2-tight">
      ${filtered.length===0 ? `
        <div class="empty">
          <div class="empty-icon">👤</div>
          <div class="empty-title">${alunos.length===0?"Nenhum aluno cadastrado":"Sem resultados"}</div>
          <div class="empty-sub">${alunos.length===0?'Clique em "+ Novo Aluno" para começar':'Ajuste os filtros acima'}</div>
        </div>
      ` : `
        <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>#</th>
            <th>Nome</th>
            <th>Classe</th>
            <th>Cadastro</th>
            <th>Status</th>
            <th>Ações</th>
          </tr></thead>
          <tbody>
            ${filtered.map((a,i)=>{
              const cl = cls(a.classe_id);
              const pres = frequencias.filter(f=>f.aluno_id===a.id&&f.presente===1).length;
              return`<tr>
                <td style="color:#9CA3AF;font-size:13px">${i+1}</td>
                <td>
                  <div style="font-weight:800;color:var(--navy)">${a.nome}</div>
                  <div style="font-size:11px;color:var(--gray)">${pres} presença${pres!==1?"s":""}</div>
                </td>
                <td>${cl.nome?`<span class="badge2" style="background:${cl.cor+"18"};color:${cl.cor}">${cl.emoji} ${cl.nome}</span>`:""}</td>
                <td style="font-size:13px;color:var(--gray)">${toBR(a.data_cadastro)}</td>
                <td><span class="badge2 ${a.status==="ativo"?"badge-green":"badge-red"}">${a.status==="ativo"?"✅ Ativo":"🚫 Inativo"}</span></td>
                <td>
                  <div style="display:flex;gap:6px;flex-wrap:wrap">
                    <button class="btn2 btn2-sm btn-blue" onclick="openEditAluno('${a.id}')">✏️ Editar</button>
                    <button class="btn2 btn2-sm ${a.status==="ativo"?"btn-red":"btn-green"}" onclick="toggleAluno('${a.id}')">
                      ${a.status==="ativo"?"🚫 Inativar":"✅ Ativar"}
                    </button>
                    <button class="btn2 btn2-sm btn-gray" onclick="excluirAluno('${a.id}')">🗑️</button>
                  </div>
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
        </div>
      `}
    </div>
  `;
}

function openNovoAluno(){
  document.getElementById("modal-aluno-title").textContent = "➕ Novo Aluno";
  document.getElementById("al-id").value = "";
  document.getElementById("al-nome").value = "";
  document.getElementById("al-status").value = "ativo";
  document.getElementById("al-status-row").style.display = "none";
  populateClasseSelect("");
  openModal("modal-aluno");
  setTimeout(()=>document.getElementById("al-nome").focus(),200);
}
function openEditAluno(id){
  const a = alunos.find(x=>x.id===id);
  if(!a) return;
  document.getElementById("modal-aluno-title").textContent = "✏️ Editar Aluno";
  document.getElementById("al-id").value = a.id;
  document.getElementById("al-nome").value = a.nome;
  document.getElementById("al-status").value = a.status;
  document.getElementById("al-status-row").style.display = "block";
  populateClasseSelect(a.classe_id);
  openModal("modal-aluno");
}
function salvarAluno(){
  const nome   = document.getElementById("al-nome").value.trim();
  const clsId  = document.getElementById("al-classe").value;
  const id     = document.getElementById("al-id").value;
  const status = document.getElementById("al-status").value || "ativo";
  if(!nome)  { alert("Informe o nome completo do aluno."); return; }
  if(!clsId) { alert("Selecione a classe do aluno."); return; }
  if(id){
    alunos = alunos.map(a=>a.id===id?{...a,nome,classe_id:clsId,status}:a);
  } else {
    alunos.push({id:uid(),nome,classe_id:clsId,status:"ativo",data_cadastro:today()});
  }
  saveData(); updateHeader(); closeModal("modal-aluno"); renderAlunos();
}
function toggleAluno(id){
  alunos = alunos.map(a=>a.id===id?{...a,status:a.status==="ativo"?"inativo":"ativo"}:a);
  saveData(); updateHeader(); renderAlunos();
}
function excluirAluno(id){
  const a = alunos.find(x=>x.id===id);
  if(!a) return;
  const nReg = frequencias.filter(f=>f.aluno_id===id).length;
  const msg  = nReg>0
    ? `Excluir "${a.nome}" permanentemente?\n\n⚠️ ${nReg} registro(s) de frequência e pontuação também serão apagados.\n\nEsta ação não pode ser desfeita.`
    : `Excluir "${a.nome}" permanentemente?\n\nEsta ação não pode ser desfeita.`;
  if(!confirm(msg)) return;
  alunos      = alunos.filter(x=>x.id!==id);
  frequencias = frequencias.filter(f=>f.aluno_id!==id);
  saveData(); updateHeader(); renderAlunos();
}

let cRegs = [], cLoaded = false, cEditing = false, cChamadaId = null;

  const el = document.getElementById("p-chamada");

          <select class="finput" id="c-cls" onchange="cLoaded=false">

function carregarChamada(){
  const data  = document.getElementById("c-data").value;
  const clsId = document.getElementById("c-cls").value;
  const msg   = document.getElementById("c-msg");
  clearAlert(msg);

  if(!data)  { showAlert(msg,"⚠️ Informe a data da aula.","err"); return; }
  if(!clsId) { showAlert(msg,"⚠️ Selecione a classe.","err"); return; }

  const al = alunos.filter(a=>a.classe_id==clsId&&a.status==="ativo")
                   .sort((a,b)=>a.nome.localeCompare(b.nome));
  if(!al.length){ showAlert(msg,"⚠️ Nenhum aluno ativo nesta classe.","err"); return; }

  const exist = chamadas.find(c=>c.data_aula===data&&c.classe_id==clsId);
  if(exist){
    cChamadaId = exist.id;
    const fe = frequencias.filter(f=>f.chamada_id===exist.id);
    cRegs = al.map(a=>{
      const f = fe.find(x=>x.aluno_id===a.id);
      return{aluno:a, status:f?.status||null, harpa:f?.harpa||false, professor:f?.professor||false, musico:f?.musico||false, super:f?.super||false, perguntas:f?.perguntas||0};
    });
    cEditing = true;
    showAlert(msg,`⚠️ Chamada já registrada para ${cls(clsId).nome} em ${toBR(data)}. Você pode editar.`,"warn");
  } else {
    cChamadaId = null;
    cRegs = al.map(a=>({aluno:a, status:null, harpa:false, professor:false, musico:false, super:false, perguntas:0}));
    cEditing = false;
  }
  cLoaded = true;
  renderChamadaBody(data, clsId, msg);
}

      </div>
      <div class="row g-2 mb-3">
        ${[
          ["Alunos",   cRegs.length,    "var(--navy)"],
          ["Presentes",presentes,        "var(--green)"],
          ["Pendentes",pendentes,        pendentes>0?"var(--red)":"var(--gray)"],
          ["Atrasados",atrasados,        "var(--purple)"],
        ].map(([l,v,c])=>`<div class="col-3" style="text-align:center">
          <div style="font-size:9px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px">${l}</div>
          <div style="font-size:28px;font-weight:900;color:${c}">${v}</div>
        </div>`).join("")}
      </div>
      <div class="pbar"><div class="pbar-fill" id="c-pbar" style="width:${cRegs.length>0?(cRegs.filter(r=>r.status).length/cRegs.length*100):0}%;background:${cl.cor}"></div></div>
    </div>

    <div class="card2">
      <div class="row g-3 align-items-end">
        <div class="col-7">
          <label class="flabel">💰 Oferta da Classe (R$)</label>
          <input type="number" class="finput finput-lg" id="c-oferta"
            placeholder="0.00" min="0" step="0.01" value="${ofertaVal}"

              style="text-align:center;font-size:22px;font-weight:900;color:var(--teal);padding:8px 4px">
            <button onclick="adjVisit(+1)" style="width:42px;height:42px;border-radius:10px;border:2px solid var(--border);background:#F8FAFC;font-size:22px;font-weight:800;cursor:pointer;flex:0 0 auto">+</button>
          </div>

    <div style="margin-bottom:12px">

        ${Object.entries(STATUS).map(([k,v])=>`
          <span style="display:inline-flex;align-items:center;gap:4px;background:${v.bg};border:1.5px solid ${v.c};border-radius:8px;padding:4px 10px;font-size:12px;font-weight:800;color:${v.c}">${v.emoji} ${k} · ${v.pts} pts</span>

function renderStudentRow(r,idx){
  const cfg    = r.status ? STATUS[r.status] : null;
  const pts    = calcPts(r);
  const isFalta= r.status==="FALTA";
  const pq     = +r.perguntas||0;
  return`<div class="s-row" id="sr-${idx}" style="border-left-color:${cfg?cfg.c:"var(--border)"}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <div class="s-row-name" style="margin:0">${idx+1}. ${r.aluno.nome}</div>
      <div id="pts-display-${idx}" style="background:${pts>0?"var(--purple)":"#F3F4F6"};color:${pts>0?"#fff":"var(--gray)"};border-radius:10px;padding:5px 13px;font-size:16px;font-weight:900;transition:all .2s">
        🎯 ${pts} pts
      </div>
    </div>

    <!-- STATUS -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      ${Object.entries(STATUS).map(([k,v])=>`
        <button class="st-btn" id="st-${idx}-${k}"
          style="border-color:${v.c};background:${r.status===k?v.c:"transparent"};color:${r.status===k?"#fff":v.c};flex:1 1 70px"
          onclick="setSt(${idx},'${k}')">${v.emoji} ${k}</button>
      `).join("")}
    </div>

    <!-- PERGUNTAS + BÔNUS (desabilitados se FALTA) -->
    <div style="opacity:${isFalta?0.3:1};pointer-events:${isFalta?"none":"auto"}">
      <!-- Perguntas -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">Perguntas (×5pts):</span>
        <div style="display:flex;gap:5px">
          ${[0,1,2,3,4].map(n=>`
            <button id="pq-${idx}-${n}" onclick="setPerguntas(${idx},${n})"
              style="width:40px;height:40px;border-radius:9px;border:2px solid ${pq===n?"#2563EB":"var(--border)"};
                     background:${pq===n?"#2563EB":"#F8FAFC"};color:${pq===n?"#fff":"var(--navy)"};
                     font-size:16px;font-weight:900;cursor:pointer;transition:all .12s">${n}</button>
          `).join("")}
        </div>
        <span style="font-size:11px;color:var(--gray)">${pq*5} pts</span>
      </div>
    <!-- BÔNUS regulares -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
        ${Object.entries(BONUS).filter(([k])=>k!=="super").map(([k,v])=>`
          <button id="bn-${idx}-${k}" onclick="toggleBonus(${idx},'${k}')"
            style="padding:8px 11px;font-size:12px;font-weight:800;border-radius:10px;
                   border:2px solid ${v.c};min-height:40px;cursor:pointer;transition:all .15s;
                   background:${r[k]?v.c:"transparent"};color:${r[k]?"#fff":v.c}">
            ${v.emoji} ${v.label} <span style="font-size:10px;opacity:.85">+5</span>
          </button>
        `).join("")}
      </div>
      <!-- PERGUNTA SUPER -->
      <button id="bn-${idx}-super" onclick="toggleBonus(${idx},'super')"
        style="width:100%;padding:11px;font-size:14px;font-weight:900;border-radius:10px;
               border:2px solid #DC2626;cursor:pointer;transition:all .15s;letter-spacing:.3px;
               background:${r.super?"#DC2626":"transparent"};color:${r.super?"#fff":"#DC2626"}">
        ⚡ PERGUNTA SUPER &nbsp;+15 pts
      </button>
    </div>
  </div>`;
}

function setSt(idx,st){
  cRegs[idx].status = st;
  const row = document.getElementById("sr-"+idx);
  if(row){
    row.style.borderLeftColor = STATUS[st].c;
    // Update status buttons
    Object.keys(STATUS).forEach(k=>{
      const b = document.getElementById(`st-${idx}-${k}`);
      if(b){
        b.style.background = k===st ? STATUS[st].c : "transparent";
        b.style.color      = k===st ? "#fff" : STATUS[k].c;
      }
    });
    // Enable/disable bonus area
    const isFalta = st==="FALTA";
    const bonusWrap = row.querySelector('[id^="bn-"]')?.parentElement;
    if(bonusWrap){
      bonusWrap.style.opacity      = isFalta?"0.3":"1";
      bonusWrap.style.pointerEvents= isFalta?"none":"auto";
    }
    // If FALTA, clear bonuses and perguntas
    if(isFalta){
      cRegs[idx].harpa=false;
      cRegs[idx].professor=false;
      cRegs[idx].musico=false;
      cRegs[idx].super=false;
      cRegs[idx].perguntas=0;
    }
  }
  refreshPtsDisplay(idx);
  // Update progress bar and counters
  const done = cRegs.filter(r=>r.status).length;
  const pbar = document.getElementById("c-pbar");
  if(pbar) pbar.style.width = (done/cRegs.length*100)+"%";
  const pres  = cRegs.filter(r=>r.status&&r.status!=="FALTA").length;
  const pend  = cRegs.filter(r=>!r.status).length;
  const atras = cRegs.filter(r=>r.status==="ATRASADO").length;
  const nums  = document.querySelectorAll("#c-body .row.g-2.mb-3 .col-3 [style*='font-size:28px']");
  if(nums[1]) nums[1].textContent=pres;
  if(nums[2]){nums[2].textContent=pend; nums[2].style.color=pend>0?"var(--red)":"var(--gray)";}
  if(nums[3]) nums[3].textContent=atras;
  const sBtn = document.getElementById("c-save-btn");
  if(sBtn) sBtn.textContent=`💾 ${cEditing?"Atualizar":"Salvar"} Chamada — ${done}/${cRegs.length} marcados`;
}

function toggleBonus(idx,key){
  cRegs[idx][key] = !cRegs[idx][key];
  const v  = BONUS[key];
  const b  = document.getElementById(`bn-${idx}-${key}`);
  const on = cRegs[idx][key];
  if(b){
    b.style.background = on ? v.c : "transparent";
    b.style.color      = on ? "#fff" : v.c;
  }
  refreshPtsDisplay(idx);
}

function setPerguntas(idx, n){
  cRegs[idx].perguntas = n;
  [0,1,2,3,4].forEach(v=>{
    const b = document.getElementById(`pq-${idx}-${v}`);
    if(b){
      b.style.background  = v===n ? "#2563EB" : "#F8FAFC";
      b.style.borderColor = v===n ? "#2563EB" : "var(--border)";
      b.style.color       = v===n ? "#fff"    : "var(--navy)";
    }
  });
  // update pts label next to buttons
  const wrap = document.getElementById(`pq-${idx}-0`)?.parentElement?.nextElementSibling;
  if(wrap) wrap.textContent = (n*5)+" pts";
  refreshPtsDisplay(idx);
}

function adjVisit(d){
  const el = document.getElementById("c-visit");
  if(el) el.value = Math.max(0, (+el.value||0) + d);
}

function refreshPtsDisplay(idx){
  const pts = calcPts(cRegs[idx]);
  const el  = document.getElementById(`pts-display-${idx}`);
  if(el){
    el.textContent = `🎯 ${pts} pts`;
    el.style.background = pts>0 ? "var(--purple)" : "#F3F4F6";
    el.style.color      = pts>0 ? "#fff" : "var(--gray)";
  }
}

function salvarChamada(){
  const data  = document.getElementById("c-data")?.value;
  const clsId = document.getElementById("c-cls")?.value;
  const msg   = document.getElementById("c-msg");
  clearAlert(msg);

  if(!data)         { showAlert(msg,"⚠️ Informe a data.","err"); return; }
  if(!clsId)        { showAlert(msg,"⚠️ Selecione a classe.","err"); return; }
  if(!cRegs.length) { showAlert(msg,"⚠️ Nenhum aluno carregado.","err"); return; }
  const sem = cRegs.filter(r=>!r.status);
  if(sem.length){
    showAlert(msg,"⚠️ Defina a situação de: " + sem.map(r=>r.aluno.nome.split(" ")[0]).join(", "),"err");
    return;
  }
  const oferta     = +document.getElementById("c-oferta")?.value||0;
  const visitantes = +document.getElementById("c-visit")?.value||0;
  let cid;
  if(cEditing && cChamadaId){
    cid = cChamadaId;
    chamadas = chamadas.map(c=>c.id===cid?{...c,oferta,visitantes}:c);
    frequencias = frequencias.filter(f=>f.chamada_id!==cid);
  } else {
    cid = uid();
    chamadas.push({id:cid,data_aula:data,classe_id:clsId,oferta,visitantes});
  }
  cRegs.forEach(r=>{
    frequencias.push({
      id:uid(), chamada_id:cid, aluno_id:r.aluno.id, status:r.status,
      presente:  r.status!=="FALTA" ? 1 : 0,
      harpa:     r.harpa     ? 1 : 0,
      professor: r.professor ? 1 : 0,
      musico:    r.musico    ? 1 : 0,
      super:     r.super     ? 1 : 0,
      perguntas: +r.perguntas||0,
      pontuacao: calcPts(r),
    });
  });
  saveData(); updateHeader();
  cRegs=[]; cLoaded=false; cEditing=false; cChamadaId=null;
  showAlert(msg,`✅ Chamada de ${cls(clsId).nome} em ${toBR(data)} salva com sucesso!`,"ok");
  document.getElementById("c-body").innerHTML="";
  document.getElementById("c-cls").value="";
  window.scrollTo({top:0,behavior:"smooth"});
}

      <div class="row g-3 align-items-end">

          <label class="flabel">📅 Data da Consulta</label>
          <input type="date" class="finput finput-lg" id="ind-data" value="${today()}">
        </div>
        <div class="col-4">
          <button class="btn2 btn-navy btn2-full btn2-lg" onclick="consultarInd()">🔍 Consultar</button>

function consultarInd(){
  const data = document.getElementById("ind-data").value;
  const el   = document.getElementById("ind-res");
  if(!data){ el.innerHTML=`<div class="alert2 al-err show">Informe a data.</div>`; return; }

  const chs = chamadas.filter(c=>c.data_aula===data);
  if(!chs.length){
    el.innerHTML=`<div class="alert2 al-warn show">📭 Nenhuma chamada registrada em ${toBR(data)}.</div>`;
    return;
  }
  const fqs = frequencias.filter(f=>chs.some(c=>c.id===f.chamada_id));
  const byCl = CLASSES.map(cl=>{
    const ch  = chs.find(c=>c.classe_id===cl.id);
    if(!ch) return{...cl,hasData:false,presentes:0,total:0,pct:0,oferta:0,pontos:0,revistas:0,biblias:0};
    const fc  = fqs.filter(f=>f.chamada_id===ch.id);
    const tot = alunos.filter(a=>a.classe_id===cl.id&&a.status==="ativo").length;
    const pre = fc.filter(f=>f.presente===1).length;
    return{...cl,hasData:true,
      presentes:pre, total:tot, pct:tot>0?pre/tot:0,
      oferta:+ch.oferta||0,
      pontos:fc.reduce((s,f)=>s+(+f.pontuacao||0),0),
      harpa:fc.filter(f=>f.harpa===1).length,
      professor:fc.filter(f=>f.professor===1).length,
    };
  });
  const wd = byCl.filter(c=>c.hasData);
  const topPres    = [...wd].sort((a,b)=>b.pct-a.pct)[0];
  const topOferta  = [...wd].sort((a,b)=>b.oferta-a.oferta)[0];
  const totOferta  = chs.reduce((s,c)=>s+(+c.oferta||0),0);
  const totPres    = fqs.filter(f=>f.presente===1).length;
  const totVisit   = chs.reduce((s,c)=>s+(+c.visitantes||0),0);
  const topVisit   = [...wd].sort((a,b)=>{
    const va = chs.find(c=>c.classe_id==a.id); const vb = chs.find(c=>c.classe_id==b.id);
    return (+vb?.visitantes||0)-(+va?.visitantes||0);
  })[0];
  const topVisitVal = topVisit ? (+chs.find(c=>c.classe_id==topVisit.id)?.visitantes||0) : 0;

  // Perguntas por classe (perguntas regulares + super)
  const qByClass = CLASSES.map(cl=>{
    const ch = chs.find(c=>c.classe_id==cl.id);
    if(!ch) return{cl,total:0};
    const fc = fqs.filter(f=>f.chamada_id===ch.id);
    const total = fc.reduce((s,f)=>s+(+f.perguntas||0)+(+f.super||0),0);
    return{cl,total};
  });
  const maxQ   = Math.max(...qByClass.map(x=>x.total), 0);
  const topQ   = maxQ>0 ? qByClass.filter(x=>x.total===maxQ) : [];
  const isTie  = topQ.length>1;
  const totQ   = qByClass.reduce((s,x)=>s+x.total,0);
  const qColor = isTie ? "var(--gray)" : "#F97316";

  el.innerHTML = `

        <div class="kpi" style="border-left-color:var(--purple);gap:0">

          <div class="kpi-value" style="color:var(--purple);font-size:${topPres&&topPres.nome.length>12?'16px':'20px'}">${topPres?topPres.nome:"—"}</div>
          ${topPres?`<div style="font-size:13px;font-weight:800;color:var(--purple);margin-top:2px">${(topPres.pct*100).toFixed(0)}%</div>`:""}
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
            <div style="font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px">Total de Presentes</div>
            <div style="font-size:20px;font-weight:900;color:var(--purple);margin-top:2px">${totPres} aluno${totPres!==1?"s":""}</div>
          </div>
        </div>
      </div>
      <!-- OFERTA -->
      <div class="col-12 col-md-3">
        <div class="kpi" style="border-left-color:var(--amber);gap:0">
          <div class="kpi-icon">💰</div>
          <div class="kpi-label">Maior Oferta</div>
          <div class="kpi-value" style="color:var(--amber);font-size:${topOferta&&topOferta.nome.length>12?'16px':'20px'}">${topOferta?topOferta.nome:"—"}</div>
          ${topOferta?`<div style="font-size:13px;font-weight:800;color:var(--amber);margin-top:2px">${brl(topOferta.oferta)}</div>`:""}
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
            <div style="font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px">Total Arrecadado</div>
            <div style="font-size:20px;font-weight:900;color:var(--amber);margin-top:2px">${brl(totOferta)}</div>
          </div>
        </div>
      </div>
      <!-- VISITANTES -->
      <div class="col-12 col-md-3">
        <div class="kpi" style="border-left-color:var(--teal);gap:0">
          <div class="kpi-icon">🚪</div>
          <div class="kpi-label">Maior nº de Visitantes</div>
          <div class="kpi-value" style="color:var(--teal);font-size:${topVisit&&topVisit.nome.length>12?'16px':'20px'}">${topVisitVal>0?(topVisit?.nome||"—"):"—"}</div>
          ${topVisitVal>0?`<div style="font-size:13px;font-weight:800;color:var(--teal);margin-top:2px">${topVisitVal} visitante${topVisitVal!==1?"s":""}</div>`:""}
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
            <div style="font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px">Total de Visitantes</div>
            <div style="font-size:20px;font-weight:900;color:var(--teal);margin-top:2px">${totVisit} visitante${totVisit!==1?"s":""}</div>
          </div>
        </div>
      </div>
      <!-- PERGUNTAS -->
      <div class="col-12 col-md-3">
        <div class="kpi" style="border-left-color:${qColor};gap:0">
          <div class="kpi-icon">📝</div>
          <div class="kpi-label">Mais Perguntas Respondidas</div>
          <div class="kpi-value" style="color:${qColor};font-size:${isTie&&topQ.length>2?'13px':topQ[0]?.cl.nome.length>12?'15px':'20px'}">
            ${maxQ===0?"—":isTie?topQ.map(x=>x.cl.nome).join(" · "):topQ[0].cl.nome}
          </div>
          ${maxQ>0?`<div style="font-size:13px;font-weight:800;color:${qColor};margin-top:2px">${isTie?"Empate — ":""}${maxQ} pergunta${maxQ!==1?"s":""}</div>`:""}
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
            <div style="font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px">Total de Perguntas</div>
            <div style="font-size:20px;font-weight:900;color:${qColor};margin-top:2px">${totQ}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card2 card2-tight">
      <div style="padding:16px 18px 8px;font-size:15px;font-weight:800;color:var(--navy)">📊 Detalhes por Classe — ${toBR(data)}</div>
      <div style="overflow-x:auto">
      <table class="tbl">

          <th>Classe</th><th>Pres.</th><th>Alunos</th><th>Visit.</th><th>Oferta</th><th>%</th>

        <tbody>

            return`<tr ${!cl.hasData?'style="opacity:.4"':""}>
              <td><span style="color:${cl.cor};font-weight:800">${cl.emoji} ${cl.nome}</span></td>
              <td style="font-weight:700;color:var(--green)">${cl.presentes}</td>
              <td>${cl.total}</td>
              <td style="font-weight:700;color:var(--teal)">${visit}</td>
              <td style="font-weight:800;color:var(--green)">${brl(cl.oferta)}</td>
              <td>
                <span style="font-weight:800;color:${cc}">${pct}%</span>
                <div class="pbar" style="min-width:50px"><div class="pbar-fill" style="width:${pct}%;background:${cc}"></div></div>
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
      </div>
    </div>

    <div class="card2 card2-tight">
      <div style="padding:16px 18px 8px;font-size:15px;font-weight:800;color:var(--navy)">👥 Detalhes por Aluno — ${toBR(data)}</div>
      <div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr><th>Aluno</th><th>Classe</th><th>Situação</th><th>Pontos</th><th>Harpa</th><th>Prof.</th><th>Músico</th></tr></thead>
        <tbody>
          ${fqs.sort((a,b)=>{const an=alunos.find(x=>x.id===a.aluno_id)?.nome||"";const bn=alunos.find(x=>x.id===b.aluno_id)?.nome||"";return an.localeCompare(bn);})
            .map(f=>{
              const a  = alunos.find(x=>x.id===f.aluno_id);
              const cl = cls(a?.classe_id);
              const st = STATUS[f.status]||{c:"#ccc",emoji:"—"};
              return`<tr>
                <td style="font-weight:700;color:var(--navy)">${a?.nome||"—"}</td>
                <td>${cl.nome?`<span style="color:${cl.cor};font-weight:700">${cl.emoji} ${cl.nome}</span>`:""}</td>
                <td><span style="color:${st.c};font-weight:800">${st.emoji} ${f.status}</span></td>
                <td style="font-weight:800;color:var(--purple)">${f.pontuacao||0}</td>
                <td>${f.harpa?"🎵":"—"}</td>
                <td>${f.professor?"📖":"—"}</td>
                <td>${f.musico?"🎸":"—"}</td>
              </tr>`;
            }).join("")}
        </tbody>
      </table>
      </div>
    </div>
  `;
}

function destroyChart(id){
  if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}
}
function buildCharts(){
  const baseOpts = {
    responsive:true,
    plugins:{legend:{display:false}},
    scales:{
      x:{grid:{display:false},ticks:{color:"#9CA3AF",font:{size:11}}},
      y:{grid:{color:"#F3F4F6"},ticks:{color:"#9CA3AF",font:{size:11}}},
    }
  };

  // CH1 – Presenças por classe
  destroyChart("ch1");
  chartInstances["ch1"] = new Chart(document.getElementById("ch1"),{
    type:"bar",
    data:{
      labels:CLASSES.map(c=>c.nome),
      datasets:[{
        data:CLASSES.map(cl=>frequencias.filter(f=>chamadas.some(c=>c.id===f.chamada_id&&c.classe_id===cl.id)&&f.presente===1).length),
        backgroundColor:CLASSES.map(c=>c.cor),
        borderRadius:8,
      }]
    },
    options:baseOpts
  });

  // CH2 – Ofertas por classe
  destroyChart("ch2");
  chartInstances["ch2"] = new Chart(document.getElementById("ch2"),{
    type:"bar",
    data:{
      labels:CLASSES.map(c=>c.nome),
      datasets:[{
        data:CLASSES.map(cl=>+chamadas.filter(c=>c.classe_id===cl.id).reduce((s,c)=>s+(+c.oferta||0),0).toFixed(2)),
        backgroundColor:["#D97706","#3B82F6","#10B981","#F59E0B"],
        borderRadius:8,
      }]
    },
    options:{...baseOpts,scales:{...baseOpts.scales,y:{...baseOpts.scales.y,ticks:{...baseOpts.scales.y.ticks,callback:v=>"R$"+v}}}}
  });

  // Mensal
  const mMap={};
  chamadas.forEach(ch=>{
    const k=ch.data_aula?.slice(0,7);if(!k)return;
    if(!mMap[k])mMap[k]={m:MESES[+k.slice(5,7)-1]+"/"+k.slice(2,4),p:0,o:0};
    mMap[k].p+=frequencias.filter(f=>f.chamada_id===ch.id&&f.presente===1).length;
    mMap[k].o+=+ch.oferta||0;
  });
  const mArr=Object.values(mMap).sort((a,b)=>a.m.localeCompare(b.m)).slice(-8);
  const lineBase={...baseOpts,elements:{line:{tension:.35}},plugins:{...baseOpts.plugins}};

  // CH3
  destroyChart("ch3");
  chartInstances["ch3"]=new Chart(document.getElementById("ch3"),{
    type:"line",
    data:{labels:mArr.map(m=>m.m),datasets:[{
      data:mArr.map(m=>m.p),
      borderColor:"#1B2E4B",backgroundColor:"rgba(27,46,75,.1)",
      fill:true,pointBackgroundColor:"#1B2E4B",pointRadius:5,borderWidth:2.5,
    }]},
    options:lineBase
  });

  // CH4
  destroyChart("ch4");
  chartInstances["ch4"]=new Chart(document.getElementById("ch4"),{
    type:"line",
    data:{labels:mArr.map(m=>m.m),datasets:[{
      data:mArr.map(m=>+m.o.toFixed(2)),
      borderColor:"#D97706",backgroundColor:"rgba(217,119,6,.1)",
      fill:true,pointBackgroundColor:"#D97706",pointRadius:5,borderWidth:2.5,
    }]},
    options:{...lineBase,scales:{...lineBase.scales,y:{...lineBase.scales.y,ticks:{callback:v=>"R$"+v.toFixed(0)}}}}
  });

  // CH5 – Ranking presença
  const rkP = alunos.filter(a=>a.status==="ativo").map(a=>({
    n:a.nome,
    v:frequencias.filter(f=>f.aluno_id===a.id&&f.presente===1).length
  })).sort((a,b)=>b.v-a.v).slice(0,15);
  destroyChart("ch5");
  chartInstances["ch5"]=new Chart(document.getElementById("ch5"),{
    type:"bar",
    data:{
      labels:rkP.map(x=>x.n.split(" ")[0]),
      datasets:[{data:rkP.map(x=>x.v),backgroundColor:"#059669",borderRadius:6}]
    },
    options:{...baseOpts,indexAxis:"y",scales:{
      x:{grid:{color:"#F3F4F6"},ticks:{color:"#9CA3AF",font:{size:11}}},
      y:{grid:{display:false},ticks:{color:"#1B2E4B",font:{size:12,weight:"700"}}},
    }}
  });

  // CH6 – Ranking pontuação
  const rkPt = alunos.filter(a=>a.status==="ativo").map(a=>({
    n:a.nome,
    v:frequencias.filter(f=>f.aluno_id===a.id).reduce((s,f)=>s+(+f.pontuacao||0),0)
  })).sort((a,b)=>b.v-a.v).slice(0,15);
  destroyChart("ch6");
  chartInstances["ch6"]=new Chart(document.getElementById("ch6"),{
    type:"bar",
    data:{
      labels:rkPt.map(x=>x.n.split(" ")[0]),
      datasets:[{data:rkPt.map(x=>x.v),backgroundColor:"#7C3AED",borderRadius:6}]
    },
    options:{...baseOpts,indexAxis:"y",scales:{
      x:{grid:{color:"#F3F4F6"},ticks:{color:"#9CA3AF",font:{size:11}}},
      y:{grid:{display:false},ticks:{color:"#1B2E4B",font:{size:12,weight:"700"}}},
    }}
  });
}

function getRelChamadas(){
  const fD  = document.getElementById("r-data")?.value||"";
  const fM  = document.getElementById("r-mes")?.value||"";
  const fA  = document.getElementById("r-ano")?.value||"";
  const fCl = document.getElementById("r-cls")?.value||"";
  return chamadas.filter(c=>
    (!fD  || c.data_aula===fD) &&
    (!fM  || c.data_aula?.slice(5,7)===fM) &&
    (!fA  || c.data_aula?.slice(0,4)===fA) &&
    (!fCl || c.classe_id==fCl)
  );
}

  const chs = getRelChamadas();

    b.classList.toggle("active",["freq","ofertas","alunos","ranking"][i]===relTab);

  if(!chs.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📄</div><div class="empty-title">Nenhum registro</div><div class="empty-sub">Ajuste os filtros acima</div></div>`;
    return;

  if(relTab==="freq"){
    const rows=[];
    chs.sort((a,b)=>(b.data_aula||"").localeCompare(a.data_aula||"")).forEach(ch=>{
      const cl=cls(ch.classe_id);
      frequencias.filter(f=>f.chamada_id===ch.id).forEach(f=>{
        const a=alunos.find(x=>x.id===f.aluno_id);

        rows.push({data:ch.data_aula,cl,a,f,st});

      <table class="tbl">

        <tbody>
          ${rows.slice(0,300).map(r=>`<tr>
            <td style="font-size:13px">${toBR(r.data)}</td>
            <td><span style="color:${r.cl.cor};font-weight:700">${r.cl.emoji} ${r.cl.nome}</span></td>
            <td style="font-weight:700">${r.a?.nome||"—"}</td>
            <td><span style="color:${(STATUS[r.f.status]||{c:"#ccc"}).c};font-weight:800">${(STATUS[r.f.status]||{emoji:"?"}).emoji} ${r.f.status}</span></td>
